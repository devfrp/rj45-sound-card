name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_suffix: linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_suffix: macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_suffix: macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_suffix: windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../rjsc-${{ matrix.artifact_suffix }}.tar.gz rjsc

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a -tzip ../../../rjsc-${{ matrix.artifact_suffix }}.zip rjsc.exe

      - name: Compute SHA256 (Linux/macOS)
        if: runner.os != 'Windows'
        run: sha256sum rjsc-${{ matrix.artifact_suffix }}.tar.gz

      - name: Compute SHA256 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-FileHash -Algorithm SHA256 "rjsc-${{ matrix.artifact_suffix }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rjsc-${{ matrix.artifact_suffix }}
          path: rjsc-${{ matrix.artifact_suffix }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
